services:
  postgres:
    image: postgres:16-alpine
    container_name: inkora_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inkora_user
      POSTGRES_PASSWORD: inkora_pass
      POSTGRES_DB: inkora_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
